name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: cd backend && ruff check app/ tests/

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: acras
          POSTGRES_PASSWORD: acras
          POSTGRES_DB: acras_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U acras"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: cd backend && pip install -e ".[dev]"
      - run: cd backend && pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://acras:acras@localhost:5432/acras_test
          DATABASE_SYNC_URL: postgresql://acras:acras@localhost:5432/acras_test
          REDIS_URL: redis://localhost:6379/0

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
      - run: cd frontend && npm run lint
