# Crash classifier training configuration

model:
  backbone: resnet18
  pretrained: true
  num_classes: 1  # Binary classification (crash probability)
  dropout: 0.5
  hidden_dim: 256

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: reduce_on_plateau
  scheduler_patience: 5
  scheduler_factor: 0.5
  early_stopping_patience: 10

data:
  image_size: 224
  train_augmentations:
    - horizontal_flip: 0.5
    - rotation: 10
    - color_jitter:
        brightness: 0.3
        contrast: 0.3
        saturation: 0.2
    - random_crop: 0.9
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - auc_roc
  target_f1: 0.80
  target_fpr: 0.05
